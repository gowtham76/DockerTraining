name: CI Pipeline

on:
  push:
   # branches:
   #   - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Build + Sonar Scan ✅ (UPDATED STEP)
      - name: Build and Sonar Scan
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=gowtham76_DockerTraining \
            -Dsonar.organization=gowtham76 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # Build Docker image
      - name: Build Docker image
        run: docker build -t gowtham76/spring-hello-app .

      # Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Push image
      - name: Push Docker image
        run: docker push gowtham76/spring-hello-app